<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SFW Image Downloader | My Tech Site</title>

    <link rel="stylesheet" href="../css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>

    <main>
        <div class="container">
            <div class="download-card">
                <h1>SFW Image Downloader</h1>
                <div class="input-group">
                    <label for="imageCount">Image Count:</label>
                    <input type="number" id="imageCount" value="50" min="1" max="100">
                </div>

                <div class="input-group">
                    <label for="apiSelector">Select API:</label>
                    <select id="apiSelector">
                        <option value="waifu.pics">Waifu.pics</option>
                        <option value="konachan">Konachan.net</option>
                        <option value="yande.re">Yande.re</option>
                    </select>
                </div>

                <button id="downloadBtn">DOWNLOAD & ZIP</button>
                <div class="loading" id="loadingAnimation"></div>
                <div class="download-status-bar" id="downloadStatusBar">
                    <div class="status-text" id="statusText">Preparing...</div>
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                    </div>
                    <div class="progress-percentage" id="progressPercentage">0%</div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/components.js" defer></script>
    <script src="../js/main.js" defer></script>
    <script src="../js/sfw-downloader.js" defer></script>

</body>

</html>
