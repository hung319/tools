<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Text Generator | My Tech Site</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        .hash-input-area {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            margin-bottom: 20px;
            resize: vertical;
            min-height: 80px;
        }

        .hash-input-area:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        #hash-display {
            font-size: 1.1rem !important;
            /* Smaller font for long hashes */
            word-break: break-all;
            text-align: center;
        }
    </style>
</head>

<body>
    <main>
        <div class="container tool-container">
            <h1>Hash Generator</h1>
            <p>Calculate hash from text using standard algorithms.</p>

            <div id="copy-message">Copied to clipboard!</div>

            <!-- Input Area -->
            <div class="control-group" style="max-width: 100%;">
                <label for="text-input">Input Text:</label>
                <textarea id="text-input" class="hash-input-area" placeholder="Type text here to hash..."></textarea>
            </div>

            <!-- Hash Type Selection -->
            <div class="control-group">
                <label for="hash-algo">Algorithm:</label>
                <select id="hash-algo">
                    <option value="MD5">MD5</option>
                    <option value="SHA1">SHA-1</option>
                    <option value="SHA256" selected>SHA-256</option>
                    <option value="SHA224">SHA-224</option>
                    <option value="SHA512">SHA-512</option>
                    <option value="SHA384">SHA-384</option>
                    <option value="SHA3">SHA-3</option>
                    <option value="RIPEMD160">RIPEMD-160</option>
                </select>
            </div>

            <!-- Display Result -->
            <div class="display-wrapper">
                <div id="hash-display" title="Click to copy"></div>
                <!-- Although it updates real-time, keep the button for user feel or re-trigger -->
                <button id="hash-btn" class="refresh-btn-circle" title="Process">↻</button>
            </div>

        </div>
    </main>

    <script src="../js/components.js" defer></script>
    <script src="../js/main.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('text-input');
            const display = document.getElementById('hash-display');
            const algoSelect = document.getElementById('hash-algo');
            const hashBtn = document.getElementById('hash-btn');
            const copyMsg = document.getElementById('copy-message');

            function calculateHash() {
                const text = input.value;
                const algo = algoSelect.value;

                if (!text) {
                    display.textContent = "";
                    return;
                }

                let hash = "";
                try {
                    if (algo === 'MD5') hash = CryptoJS.MD5(text);
                    else if (algo === 'SHA1') hash = CryptoJS.SHA1(text);
                    else if (algo === 'SHA256') hash = CryptoJS.SHA256(text);
                    else if (algo === 'SHA224') hash = CryptoJS.SHA224(text);
                    else if (algo === 'SHA512') hash = CryptoJS.SHA512(text);
                    else if (algo === 'SHA384') hash = CryptoJS.SHA384(text);
                    else if (algo === 'SHA3') hash = CryptoJS.SHA3(text);
                    else if (algo === 'RIPEMD160') hash = CryptoJS.RIPEMD160(text);

                    display.textContent = hash.toString(CryptoJS.enc.Hex);
                } catch (e) {
                    console.error(e);
                    display.textContent = "Error calculating hash";
                }
            }

            input.addEventListener('input', calculateHash);
            algoSelect.addEventListener('change', calculateHash);
            hashBtn.addEventListener('click', calculateHash);

            display.addEventListener('click', async () => {
                if (!display.textContent || display.textContent.includes("Error")) return;
                try {
                    await navigator.clipboard.writeText(display.textContent);
                    copyMsg.style.display = 'block';
                    setTimeout(() => { copyMsg.style.display = 'none'; }, 2000);
                } catch (err) {
                    console.error('Copy error:', err);
                }
            });
        });
    </script>
</body>

</html>
