<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Generator | My Tech Site</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <main>
        <div class="container tool-container">
            <h1>Port Generator</h1>
            <p>Generate a random port in range 0 - 65535</p>

            <div id="copy-message">Copied to clipboard!</div>

            <div class="display-wrapper">
                <div id="port-display" title="Click to copy"></div>
                <button id="generate-port-btn" class="refresh-btn-circle" title="Generate New">↻</button>
            </div>
        </div>
    </main>

    <script src="../js/components.js" defer></script>
    <script src="../js/main.js" defer></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const portDisplay = document.getElementById('port-display');
            const generateBtn = document.getElementById('generate-port-btn');
            const copyMessage = document.getElementById('copy-message');

            let currentPort = null;

            function generateRandomPort() {
                const min = 0;
                const max = 65535;
                currentPort = Math.floor(Math.random() * (max - min + 1)) + min;
                portDisplay.textContent = currentPort;
            }

            async function copyToClipboard() {
                if (currentPort === null) return;
                try {
                    await navigator.clipboard.writeText(currentPort.toString());
                    copyMessage.style.display = 'block';
                    setTimeout(() => { copyMessage.style.display = 'none'; }, 2000);
                } catch (err) {
                    console.error('Copy error: ', err);
                }
            }

            generateBtn.addEventListener('click', generateRandomPort);
            portDisplay.addEventListener('click', copyToClipboard);

            generateRandomPort();
        });
    </script>
</body>

</html>
