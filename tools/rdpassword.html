<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator | My Tech Site</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <main>
        <div class="container tool-container">
            <h1>Password Generator</h1>

            <div id="copy-message">Copied to clipboard!</div>

            <div class="display-wrapper">
                <div id="password-display" title="Click to copy"></div>
                <button id="generate-btn" class="refresh-btn-circle" title="Refresh">↻</button>
            </div>

            <div class="control-group">
                <label for="pass-length">Length: <span id="length-val">16</span></label>
                <input type="range" id="pass-length" min="4" max="50" value="16">
            </div>

            <div class="control-group" style="text-align: left; max-width: 300px; margin: 20px auto;">
                <label style="text-align: center; margin-bottom: 15px;">Characters Used</label>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <label
                        style="text-transform: none; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                        <span>Uppercase (A-Z)</span>
                        <input type="checkbox" id="use-upper" checked>
                    </label>
                    <label
                        style="text-transform: none; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                        <span>Lowercase (a-z)</span>
                        <input type="checkbox" id="use-lower" checked>
                    </label>
                    <label
                        style="text-transform: none; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                        <span>Numbers (0-9)</span>
                        <input type="checkbox" id="use-numbers" checked>
                    </label>
                    <label
                        style="text-transform: none; display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                        <span>Symbols (!@#$...)</span>
                        <input type="checkbox" id="use-symbols" checked>
                    </label>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/components.js" defer></script>
    <script src="../js/main.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const display = document.getElementById('password-display');
            const generateBtn = document.getElementById('generate-btn');
            const lengthInput = document.getElementById('pass-length');
            const lengthVal = document.getElementById('length-val');
            const copyMsg = document.getElementById('copy-message');

            const useUpper = document.getElementById('use-upper');
            const useLower = document.getElementById('use-lower');
            const useNumbers = document.getElementById('use-numbers');
            const useSymbols = document.getElementById('use-symbols');

            const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const lowerChars = "abcdefghijklmnopqrstuvwxyz";
            const numberChars = "0123456789";
            const symbolChars = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

            function generatePassword() {
                let charset = "";
                if (useUpper.checked) charset += upperChars;
                if (useLower.checked) charset += lowerChars;
                if (useNumbers.checked) charset += numberChars;
                if (useSymbols.checked) charset += symbolChars;

                if (charset === "") {
                    display.textContent = "Select at least 1 type";
                    display.style.fontSize = "1.2rem";
                    return;
                }
                display.style.fontSize = "1.8rem";

                let password = "";
                const length = parseInt(lengthInput.value);
                for (let i = 0; i < length; i++) {
                    password += charset.charAt(Math.floor(Math.random() * charset.length));
                }
                display.textContent = password;
            }

            lengthInput.addEventListener('input', () => {
                lengthVal.textContent = lengthInput.value;
                generatePassword();
            });

            generateBtn.addEventListener('click', generatePassword);

            display.addEventListener('click', async () => {
                if (display.textContent.length < 2) return;
                try {
                    await navigator.clipboard.writeText(display.textContent);
                    copyMsg.style.display = 'block';
                    setTimeout(() => copyMsg.style.display = 'none', 1500);
                } catch (err) {
                    console.error('Copy error:', err);
                }
            });

            [useUpper, useLower, useNumbers, useSymbols].forEach(cb => {
                cb.addEventListener('change', generatePassword);
            });

            generatePassword();
        });
    </script>
</body>

</html>
