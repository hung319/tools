<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code & Data Formatter | My Tech Site</title>
    <link rel="stylesheet" href="../css/style.css">
    <!-- Libraries for formatting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/12.2.4/sql-formatter.min.js"></script>
    <style>
        .formatter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .formatter-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .formatter-field label {
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .formatter-textarea {
            width: 100%;
            height: 450px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            resize: none;
            transition: border-color 0.3s;
        }

        .formatter-textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .formatter-controls {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .mode-selector {
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }

        @media (max-width: 768px) {
            .formatter-grid {
                grid-template-columns: 1fr;
            }

            .formatter-textarea {
                height: 300px;
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="container" style="max-width: 1200px;">
            <div class="tool-container">
                <h1>Code & Data Formatter</h1>
                <p>Prettify, minify, and format various code and data structures.</p>
                <div id="copy-message">Copied to clipboard!</div>

                <div class="formatter-controls">
                    <select id="formatter-mode" class="mode-selector">
                        <option value="json-pretty">JSON Prettify</option>
                        <option value="json-minify">JSON Minify</option>
                        <option value="json-csv">JSON to CSV</option>
                        <option value="sql-format">SQL Formatter</option>
                        <option value="xml-format">XML Formatter</option>
                        <option value="yaml-pretty">YAML Prettify</option>
                    </select>
                    <button id="format-btn" class="refresh-btn-circle" title="Execute">↻</button>
                </div>

                <div class="formatter-grid">
                    <div class="formatter-field">
                        <label>Input</label>
                        <textarea id="input-text" class="formatter-textarea"
                            placeholder="Paste your content here..."></textarea>
                    </div>
                    <div class="formatter-field">
                        <label>Output</label>
                        <textarea id="output-text" class="formatter-textarea" placeholder="Result will appear here..."
                            readonly title="Click to copy"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/components.js" defer></script>
    <script src="../js/main.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mode = document.getElementById('formatter-mode');
            const input = document.getElementById('input-text');
            const output = document.getElementById('output-text');
            const formatBtn = document.getElementById('format-btn');
            const copyMsg = document.getElementById('copy-message');

            function format() {
                const val = input.value.trim();
                if (!val) { output.value = ''; return; }
                const currentMode = mode.value;

                try {
                    let result = '';
                    switch (currentMode) {
                        case 'json-pretty':
                            result = JSON.stringify(JSON.parse(val), null, 4);
                            break;
                        case 'json-minify':
                            result = JSON.stringify(JSON.parse(val));
                            break;
                        case 'json-csv':
                            result = jsonToCsv(JSON.parse(val));
                            break;
                        case 'sql-format':
                            result = window.sqlFormatter.format(val);
                            break;
                        case 'xml-format':
                            result = formatXml(val);
                            break;
                        case 'yaml-pretty':
                            result = jsyaml.dump(jsyaml.load(val), { indent: 2 });
                            break;
                    }
                    output.value = result;
                } catch (e) {
                    output.value = "Error: " + e.message;
                }
            }

            function jsonToCsv(json) {
                if (!Array.isArray(json)) json = [json];
                const keys = Object.keys(json[0]);
                const header = keys.join(',');
                const rows = json.map(row => keys.map(key => JSON.stringify(row[key] || '')).join(','));
                return [header, ...rows].join('\n');
            }

            function formatXml(xml) {
                const PADDING = '    ';
                let reg = /(>)(<)(\/*)/g;
                let pad = 0;
                xml = xml.replace(reg, '$1\r\n$2$3');
                let formatted = '';
                let lines = xml.split('\r\n');
                let indent = 0;
                let lastType = 'other';
                let transitions = {
                    'single->single': 0,
                    'single->closing': -1,
                    'single->opening': 0,
                    'opening->single': 1,
                    'opening->opening': 1,
                    'opening->closing': 0,
                    'closing->opening': 0,
                    'closing->single': 0,
                    'closing->closing': -1
                };

                lines.forEach(line => {
                    let type = 'other';
                    if (line.match(/<[^\/].*[^/]>$/)) type = 'opening';
                    else if (line.match(/<\/.+>$/)) type = 'closing';
                    else if (line.match(/<.*?\/>/)) type = 'single';

                    if (type === 'closing') indent--;
                    formatted += PADDING.repeat(indent < 0 ? 0 : indent) + line + '\r\n';
                    if (type === 'opening') indent++;
                });
                return formatted.trim();
            }

            formatBtn.addEventListener('click', format);
            input.addEventListener('input', format);
            mode.addEventListener('change', format);

            output.addEventListener('click', async () => {
                if (!output.value) return;
                await navigator.clipboard.writeText(output.value);
                copyMsg.style.display = 'block';
                setTimeout(() => copyMsg.style.display = 'none', 1500);
            });
        });
    </script>
</body>

</html>
